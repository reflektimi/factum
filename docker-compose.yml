version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: finances-saas-app
    container_name: finances-saas-app
    restart: unless-stopped
    tty: true
    env_file:
      - .env
    environment:
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: finances
      DB_USERNAME: sail
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: file
      CACHE_STORE: redis
      SESSION_DOMAIN: localhost
      SANCTUM_STATEFUL_DOMAINS: "localhost:5173,localhost:5174"
      OCTANE_SERVER: frankenphp
    volumes:
      - .:/var/www/html
    ports:
      - "8001:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    container_name: finances-saas-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: finances
      POSTGRES_USER: sail
      POSTGRES_PASSWORD: password
    volumes:
      - ./docker/postgres/data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  redis:
    image: redis:alpine
    container_name: finances-saas-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
